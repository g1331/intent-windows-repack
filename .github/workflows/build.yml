name: Build Intent for Windows

# 触发方式:
#   1) schedule  — 每天检查更新源(stable + beta 两个频道),发现未发布过的新版本就自动重打包并发布 Release。
#      stable 发正式 Release(tag v<版本>);beta 发 prerelease(tag v<版本>-beta)。
#   2) workflow_dispatch — 手动:可填 dmg_url 直接指定(只跑 stable 一路,产 artifact 不发 Release);
#      留空则和定时一样检查两个频道。
#
# 自动获取需要仓库 Secret `INTENT_UPDATE_BASE_URL`(Intent 更新源基址)。
# 地址不写死在仓库里,避免公开第三方未文档化的下载端点。
# 固定用 windows-2022(自带 VS 2022 C++ 工具链);windows-latest 已切到 VS 2026,
# 其旧版 node-gyp 不认 VS18 会导致 node-pty 编译失败,故 pin 版本。
on:
  schedule:
    - cron: "0 8 * * *"   # 每天 UTC 08:00
  workflow_dispatch:
    inputs:
      dmg_url:
        description: "可选: Intent macOS .dmg 直链;留空则自动获取最新稳定版"
        required: false
        type: string
      force:
        description: "强制重打包(即使该版本已发布过 Release)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # 发布 Release 需要写权限

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false   # beta 一路失败不影响 stable
      matrix:
        channel: [stable, beta]
    env:
      INTENT_UPDATE_BASE_URL: ${{ secrets.INTENT_UPDATE_BASE_URL }}
    steps:
      - uses: actions/checkout@v4

      # 解析更新源最新版本号,并判断是否已发布过(定时场景用于去重,避免重复打包)
      - name: Resolve latest version
        id: ver
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $channel = "${{ matrix.channel }}"
          $dmgUrl  = "${{ inputs.dmg_url }}"
          if ($dmgUrl) {
            if ($channel -ne "stable") {
              # 手动指定 dmg 与频道无关,只在 stable 一路跑,避免重复打包
              Write-Host "手动指定 dmg_url,$channel 一路跳过"
              "skip=true" >> $env:GITHUB_OUTPUT
              exit 0
            }
            # 手动指定 dmg:不解析版本,只产 artifact,不自动发 Release
            "version=manual" >> $env:GITHUB_OUTPUT
            "skip=false"     >> $env:GITHUB_OUTPUT
            Write-Host "手动指定 dmg_url,跳过版本解析"
            exit 0
          }
          if (-not $env:INTENT_UPDATE_BASE_URL) {
            Write-Error "未配置 Secret INTENT_UPDATE_BASE_URL,无法自动获取。请在仓库 Settings → Secrets and variables → Actions 添加。"
            exit 1
          }
          $feed = "$($env:INTENT_UPDATE_BASE_URL.TrimEnd('/'))/$channel/latest-mac.yml"
          $yml  = [System.Text.Encoding]::UTF8.GetString((Invoke-WebRequest $feed -UseBasicParsing).Content)
          if ($yml -notmatch '(?m)^version:\s*(.+?)\s*$') { Write-Error "无法从清单解析版本号"; exit 1 }
          $v = $matches[1]
          Write-Host "更新源最新 $channel 版: $v"
          "version=$v" >> $env:GITHUB_OUTPUT

          # beta 打 -beta 后缀 tag,避免同版本号晋升 stable 后 tag 冲突
          $tag = if ($channel -eq "beta") { "v$v-beta" } else { "v$v" }
          "tag=$tag" >> $env:GITHUB_OUTPUT

          # 该版本是否已发布过 Release?(已发布且非强制 → 跳过)
          $force  = "${{ inputs.force }}" -eq "true"
          gh release view "$tag" 2>$null 1>$null
          $exists = ($LASTEXITCODE -eq 0)   # release 不存在时 gh 返回非0,属预期
          if ($exists -and -not $force) {
            Write-Host "$tag 已发布,跳过本次打包"
            "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            "skip=false" >> $env:GITHUB_OUTPUT
          }
          # gh release view 的非0退出码会被 Actions 当成 step 失败,显式归零
          exit 0

      - uses: actions/setup-node@v4
        if: steps.ver.outputs.skip != 'true'
        with:
          node-version: "20"

      # GitHub runner 自带的 7-Zip 可能较旧、不支持 APFS 格式 dmg;装最新版。
      - name: Ensure latest 7-Zip (APFS dmg support)
        if: steps.ver.outputs.skip != 'true'
        run: choco install 7zip -y --no-progress

      - name: Repack
        if: steps.ver.outputs.skip != 'true'
        shell: pwsh
        run: |
          $dmgUrl = "${{ inputs.dmg_url }}"
          if ($dmgUrl) {
            ./scripts/repack.ps1 -DmgUrl "$dmgUrl"
          } else {
            # 自动获取:repack.ps1 读取 env INTENT_UPDATE_BASE_URL 拉对应频道最新 dmg
            ./scripts/repack.ps1 -Channel "${{ matrix.channel }}"
          }

      # 用 Inno Setup 把 repack 产物编译成 Setup.exe(免管理员,装到用户目录,带卸载项)
      - name: Build installer
        if: steps.ver.outputs.skip != 'true'
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $v = "${{ steps.ver.outputs.version }}"
          if ($v -eq "manual") {
            # 手动 dmg 场景没解析版本号,从解包后的 package.json 里读
            $v = (Get-Content .work/Intent-win/resources/app/package.json | ConvertFrom-Json).version
          }
          iscc /DAppVersion=$v /DSourceDir="$PWD\.work\Intent-win" scripts\installer.iss
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Upload build artifact
        if: steps.ver.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: intent-win32-x64-${{ matrix.channel }}
          path: |
            dist/*.zip
            dist/*.exe
          if-no-files-found: error

      # 仅自动获取(已知版本号)时发布 Release;手动填 dmg_url 的场景只产 artifact。
      # beta 频道发 prerelease。
      - name: Publish to Release
        if: ${{ steps.ver.outputs.skip != 'true' && steps.ver.outputs.version != 'manual' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          prerelease: ${{ matrix.channel == 'beta' }}
          files: |
            dist/*.zip
            dist/*.exe
          generate_release_notes: true
